name: popl_alternative
description: A digital networking card app — POPL alternative.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Supabase backend
  supabase_flutter: ^2.5.0

  # QR Code generation & scanning
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.1.1

  # Local storage & device identity
  shared_preferences: ^2.3.2
  uuid: ^4.4.0
  path_provider: ^2.1.4

  # Media / image handling
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # Utilities
  url_launcher: ^6.3.1
  share_plus: ^10.0.0
  intl: ^0.19.0

  # UI / charts / animations
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  fl_chart: ^0.69.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
